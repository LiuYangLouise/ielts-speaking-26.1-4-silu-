    // 通用渲染函数：只渲染Part 1
    function renderPart1Panel(panelId, data) {
        const panel = document.getElementById(panelId);
        panel.innerHTML = '';

        // 话题导航
        const topicNav = document.createElement('div');
        topicNav.className = 'topic-nav';
        data.forEach((topic, idx) => {
            const btn = document.createElement('button');
            btn.className = `topic-btn ${idx === 0 ? 'active' : ''}`;
            btn.dataset.topicIdx = idx;
            btn.innerText = topic.topic;
            topicNav.appendChild(btn);
        });
        panel.appendChild(topicNav);

        // 话题面板容器
        const topicsContainer = document.createElement('div');
        topicsContainer.className = 'topics-container';
        panel.appendChild(topicsContainer);

        // 每个话题的面板
        data.forEach((topic, idx) => {
            const topicDiv = document.createElement('div');
            topicDiv.className = `topic-panel ${idx === 0 ? 'active-panel' : ''}`;
            topicDiv.id = `panel-${panelId}-${idx}`;
            topicsContainer.appendChild(topicDiv);

            // 该话题下的所有问题卡片
            topic.questions.forEach((item, qIdx) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.innerHTML = `
                    <div class="en-prompt">${item.q}</div>
                    <div class="note-area"><div class="note-label"><span>📝 笔记框</span></div><textarea class="resize-note" placeholder="记录你的关键词或想法..."></textarea></div>
                    <div class="insight-collapse">
                        <div class="insight-header" data-target="insight-${panelId}-${idx}-${qIdx}"><span>🧠 思路剖析 (点击展开)</span><span class="arrow">▼</span></div>
                        <div class="insight-content" id="insight-${panelId}-${idx}-${qIdx}"><div class="insight-deco">${item.insight}</div></div>
                    </div>
                    <div class="sentence-toggle-area">
                        <button class="btn-sentence" data-target="answer-${panelId}-${idx}-${qIdx}">📌 参考回答 点击查看</button>
                        <div class="hidden-practice" id="answer-${panelId}-${idx}-${qIdx}">
                            <div class="practice-item">
                                <div class="chinese-hint">💬 参考回答（汉英对照）</div>
                                <div style="background:#fff; border-radius:20px; padding:15px;">
                                    <div class="example-en">${item.answer}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                topicDiv.appendChild(card);
            });
        });

        // topic切换逻辑
        topicNav.querySelectorAll('.topic-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                topicNav.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const idx = this.dataset.topicIdx;
                topicsContainer.querySelectorAll('.topic-panel').forEach(p => p.classList.remove('active-panel'));
                document.getElementById(`panel-${panelId}-${idx}`).classList.add('active-panel');
            });
        });
    }

    // 初始化三个面板
    renderPart1Panel('evergreenPanel', evergreenPart1);
    renderPart1Panel('newPanel', newPart1);
    renderPart1Panel('retainedPanel', retainedPart1);

    // 主面板切换
    document.getElementById('modeEvergreen').addEventListener('click', function() {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.main-panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById('evergreenPanel').classList.add('active-panel');
    });
    document.getElementById('modeNew').addEventListener('click', function() {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.main-panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById('newPanel').classList.add('active-panel');
    });
    document.getElementById('modeRetained').addEventListener('click', function() {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.main-panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById('retainedPanel').classList.add('active-panel');
    });

    // 折叠、参考回答展开
    document.addEventListener('click', function(e) {
        if (e.target.closest('.insight-header')) {
            const header = e.target.closest('.insight-header');
            const targetId = header.dataset.target;
            const content = document.getElementById(targetId);
            const arrow = header.querySelector('.arrow');
            if (content) {
                content.classList.toggle('expanded');
                if (arrow) arrow.style.transform = content.classList.contains('expanded') ? 'rotate(180deg)' : 'rotate(0deg)';
            }
            e.preventDefault();
        }
        if (e.target.classList.contains('btn-sentence')) {
            const targetId = e.target.dataset.target;
            const practiceDiv = document.getElementById(targetId);
            if (practiceDiv) {
                practiceDiv.classList.toggle('show');
                e.target.innerText = practiceDiv.classList.contains('show') ? '📌 参考回答 隐藏' : '📌 参考回答 点击查看';
            }
        }
    });

    document.getElementById('exportBtn').addEventListener('click', function() {
        alert('导出功能：可复制当前话题内容。');
    });

    // 默认展开第一个思路
    setTimeout(() => {
        const firstInsight = document.querySelector('.insight-content');
        if (firstInsight) {
            firstInsight.classList.add('expanded');
            const arrow = document.querySelector('.insight-header .arrow');
            if (arrow) arrow.style.transform = 'rotate(180deg)';
        }
    }, 500);
</script>
</body>
</html>
